<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아키텍트</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0e0e0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JNS">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- marked.js for markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked@11/marked.min.js"></script>
<!-- highlight.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e0f;
  --surface: #161618;
  --border: #2a2a2d;
  --text: #e8e6e1;
  --muted: #6b6b70;
  --accent: #9b7fff;
  --accent-dim: #9b7fff22;
  --danger: #ff5f5f;
  --mono: 'JetBrains Mono', monospace;
  --serif: 'Noto Serif KR', serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--serif);
  min-height: 100vh;
  line-height: 1.7;
}

/* ── 로그인 ── */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  flex-direction: column;
  gap: 24px;
}
#login-screen h1 {
  font-size: 1.1rem;
  font-weight: 300;
  letter-spacing: .3em;
  color: var(--muted);
  text-transform: uppercase;
}
.login-box {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
}
.login-box input {
  background: var(--surface);
  border: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: .95rem;
  padding: 12px 16px;
  width: 240px;
  outline: none;
}
.login-box input::placeholder { color: var(--muted); }
.login-box button {
  background: var(--accent);
  border: none;
  color: #fff;
  cursor: pointer;
  font-family: var(--mono);
  font-size: .85rem;
  padding: 12px 20px;
  transition: opacity .15s;
}
.login-box button:hover { opacity: .85; }
#login-error {
  color: var(--danger);
  font-family: var(--mono);
  font-size: .8rem;
  min-height: 1em;
}

/* ── 앱 레이아웃 ── */
#app { display: none; min-height: 100vh; }

header {
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}
.site-title {
  font-size: .8rem;
  letter-spacing: .25em;
  color: var(--muted);
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
}
.site-title:hover { color: var(--text); }
.header-actions { display: flex; gap: 12px; align-items: center; }
.btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  font-family: var(--mono);
  font-size: .78rem;
  padding: 6px 14px;
  transition: all .15s;
  letter-spacing: .05em;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { opacity: .85; }
.btn.danger:hover { border-color: var(--danger); color: var(--danger); }

main { max-width: 800px; margin: 0 auto; padding: 60px 40px; }

/* ── 글 목록 ── */
#list-view {}
.list-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 40px;
}
.list-header h2 {
  font-size: 1rem;
  font-weight: 300;
  letter-spacing: .15em;
  color: var(--muted);
  text-transform: uppercase;
}
.post-count { font-family: var(--mono); font-size: .75rem; color: var(--muted); }

.post-list { list-style: none; }
.post-item {
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  padding: 16px 0;
  cursor: pointer;
  transition: all .12s;
}
.post-item:hover .post-title { color: var(--accent); }
.post-item:first-child { border-top: 1px solid var(--border); }
.post-title {
  font-size: 1rem;
  font-weight: 400;
  transition: color .12s;
  flex: 1;
}
.post-date {
  font-family: var(--mono);
  font-size: .72rem;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}

.pagination {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 48px;
}
.page-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  font-family: var(--mono);
  font-size: .75rem;
  padding: 6px 12px;
  transition: all .12s;
}
.page-btn:hover, .page-btn.active { border-color: var(--accent); color: var(--accent); }

.empty-state {
  text-align: center;
  padding: 80px 0;
  color: var(--muted);
  font-family: var(--mono);
  font-size: .85rem;
}

/* ── 글 상세 ── */
#post-view { display: none; }
.post-header { margin-bottom: 48px; }
.post-header h1 { font-size: 1.8rem; font-weight: 600; line-height: 1.4; margin-bottom: 12px; }
.post-meta {
  display: flex;
  gap: 16px;
  align-items: center;
  font-family: var(--mono);
  font-size: .75rem;
  color: var(--muted);
}
.post-actions { display: flex; gap: 8px; margin-left: auto; }

.post-body { font-size: 1.05rem; line-height: 1.9; }
.post-body h1, .post-body h2, .post-body h3 {
  font-weight: 600;
  margin: 2em 0 .6em;
  line-height: 1.4;
}
.post-body h1 { font-size: 1.5rem; }
.post-body h2 { font-size: 1.25rem; }
.post-body h3 { font-size: 1.05rem; }
.post-body p { margin: 1em 0; }
.post-body ul, .post-body ol { margin: 1em 0 1em 1.5em; }
.post-body li { margin: .3em 0; }
.post-body blockquote {
  border-left: 3px solid var(--accent);
  color: var(--muted);
  margin: 1.5em 0;
  padding: .5em 1em;
}
.post-body code {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: .85em;
  padding: .15em .4em;
}
.post-body pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin: 1.5em 0;
  overflow-x: auto;
  padding: 1.2em;
}
.post-body pre code {
  background: none;
  border: none;
  font-size: .85rem;
  padding: 0;
}
.post-body img {
  border-radius: 6px;
  max-width: 100%;
  margin: 1.5em auto;
  display: block;
}
.post-body video {
  border-radius: 6px;
  max-width: 100%;
  margin: 1.5em 0;
  display: block;
}
.post-body a { color: var(--accent); text-decoration: none; }
.post-body a:hover { text-decoration: underline; }
.post-body hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

/* ── 에디터 ── */
#editor-view { display: none; }
.editor-header { margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
.editor-header h2 { font-size: .9rem; font-weight: 300; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; flex: 1; }

#title-input {
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: var(--serif);
  font-size: 1.4rem;
  font-weight: 600;
  outline: none;
  padding: 8px 0;
  width: 100%;
  margin-bottom: 24px;
  transition: border-color .15s;
}
#title-input:focus { border-color: var(--accent); }
#title-input::placeholder { color: var(--muted); font-weight: 300; }

.editor-meta {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}
.editor-meta select, .editor-meta input[type="datetime-local"] {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0;
  color: var(--text);
  font-family: var(--mono);
  font-size: .8rem;
  padding: 7px 12px;
  outline: none;
  transition: border-color .15s;
  flex: 1;
}
.editor-meta select:focus, .editor-meta input[type="datetime-local"]:focus {
  border-color: var(--accent);
}
.editor-meta select option { background: var(--surface); }

.editor-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}
.tab {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--mono);
  font-size: .78rem;
  letter-spacing: .05em;
  padding: 8px 16px;
  border-bottom: 2px solid transparent;
  transition: all .12s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.editor-pane {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
}

#content-input {
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: .9rem;
  line-height: 1.8;
  min-height: 480px;
  outline: none;
  padding: 24px;
  resize: vertical;
  width: 100%;
}
#content-input::placeholder { color: var(--muted); }

#preview-pane {
  display: none;
  min-height: 480px;
  padding: 24px;
}

/* 미디어 툴바 */
.media-toolbar {
  align-items: center;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  background: var(--bg);
}
.media-toolbar span {
  font-family: var(--mono);
  font-size: .72rem;
  color: var(--muted);
  margin-right: 4px;
}
.upload-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  font-family: var(--mono);
  font-size: .72rem;
  padding: 4px 10px;
  transition: all .12s;
}
.upload-btn:hover { border-color: var(--accent); color: var(--accent); }
#file-input { display: none; }
#upload-status {
  font-family: var(--mono);
  font-size: .72rem;
  color: var(--muted);
  margin-left: auto;
}

.editor-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* ── 반응형 ── */
@media (max-width: 600px) {
  header { padding: 0 20px; }
  main { padding: 40px 20px; }
  .post-item { flex-direction: column; gap: 4px; }
  .post-date { font-size: .68rem; }
}


/* ── 임시저장 상태 ── */
#draft-status {
  font-family: var(--mono);
  font-size: .72rem;
  color: var(--muted);
  margin-right: auto;
}
#draft-status.saved { color: var(--accent); }

/* ── 버킷 미리보기 패널 ── */
#media-panel {
  display: none;
  border: 1px solid var(--border);
  border-top: none;
  background: var(--bg);
  max-height: 280px;
  overflow-y: auto;
}
#media-panel.open { display: block; }
.media-panel-header {
  align-items: center;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  padding: 8px 16px;
  position: sticky;
  top: 0;
  background: var(--bg);
}
.media-panel-header span {
  font-family: var(--mono);
  font-size: .72rem;
  color: var(--muted);
  flex: 1;
}
.media-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 6px;
  padding: 10px;
}
.media-thumb {
  aspect-ratio: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  overflow: hidden;
  position: relative;
  transition: border-color .12s;
}
.media-thumb:hover { border-color: var(--accent); }
.media-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  margin: 0 !important;
  border-radius: 0 !important;
  display: block;
}
.media-thumb .video-badge {
  position: absolute;
  bottom: 4px; right: 4px;
  background: rgba(0,0,0,.7);
  color: #fff;
  font-family: var(--mono);
  font-size: .6rem;
  padding: 2px 5px;
  border-radius: 3px;
}
.media-thumb .video-placeholder {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 1.8rem;
}

/* ── 형광펜 ── */
.hl-mark {
  border-radius: 2px;
  cursor: pointer;
  padding: 0 2px;
  position: relative;
  transition: filter .12s;
}
.hl-mark:hover { filter: brightness(.85); }

/* 색 선택 팝업 */
#hl-popup {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,.6);
  display: none;
  gap: 8px;
  padding: 14px;
  position: fixed;
  z-index: 9000;
  flex-direction: column;
  min-width: min(320px, calc(100vw - 24px));
  width: min(360px, calc(100vw - 24px));
}
#hl-popup.show { display: flex; }
.hl-colors {
  display: flex;
  gap: 6px;
}
.hl-color-btn {
  border: 2px solid transparent;
  border-radius: 50%;
  cursor: pointer;
  height: 22px;
  width: 22px;
  transition: transform .1s;
}
.hl-color-btn:hover { transform: scale(1.2); }
.hl-color-btn.active { border-color: var(--text); }
#hl-memo-input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: .82rem;
  outline: none;
  padding: 10px 12px;
  resize: vertical;
  width: 100%;
  height: 160px;
  line-height: 1.7;
}
#hl-memo-input:focus { border-color: var(--accent); }
#hl-memo-input::placeholder { color: var(--muted); }
.hl-popup-actions {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
}

/* 메모 툴팁 */
#hl-tooltip {
  background: #1e1e22;
  border: 1px solid #444;
  border-radius: 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,.6);
  color: #f0ede8;
  display: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: .82rem;
  font-weight: 500;
  left: 0;
  letter-spacing: .01em;
  line-height: 1.7;
  max-width: 360px;
  min-width: 180px;
  padding: 10px 14px;
  pointer-events: auto;
  position: fixed;
  white-space: pre-wrap;
  width: max-content;
  z-index: 8000;
}
#hl-tooltip.show { display: block; }

/* ── 모바일 형광펜 플로팅 버튼 ── */
#hl-float-btn {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  border: none;
  border-radius: 24px;
  color: #fff;
  cursor: pointer;
  display: none;
  font-family: var(--mono);
  font-size: .85rem;
  font-weight: 500;
  opacity: 0;
  padding: 10px 22px;
  transition: opacity .2s, transform .2s;
  z-index: 7000;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
#hl-float-btn.show {
  display: block;
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
/* ── 로딩/토스트 ── */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: .8rem;
  padding: 10px 18px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  z-index: 9999;
}
#toast.show { opacity: 1; }
#toast.error { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <h1>아키텍트</h1>
  <div class="login-box">
    <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="current-password">
    <button onclick="login()">→</button>
  </div>
  <div id="login-error"></div>
</div>

<!-- 앱 -->
<div id="app">
  <header>
    <span class="site-title" onclick="showList()">아키텍트 / 칼럼</span>
    <div class="header-actions">
      <button class="btn primary" onclick="showEditor()">새 글</button>
      <button class="btn danger" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <main>
    <!-- 목록 -->
    <div id="list-view">
      <div class="list-header">
        <h2>칼럼</h2>
        <span class="post-count" id="post-count"></span>
      </div>
      <ul class="post-list" id="post-list"></ul>
      <div class="pagination" id="pagination"></div>
    </div>

    <!-- 글 상세 -->
    <div id="post-view">
      <div class="post-header">
        <h1 id="post-title"></h1>
        <div class="post-meta">
          <span id="post-date"></span>
          <div class="post-actions">
            <button class="btn" onclick="editCurrentPost()">수정</button>
            <button class="btn danger" onclick="deleteCurrentPost()">삭제</button>
          </div>
        </div>
      </div>
      <div class="post-body" id="post-body"></div>
    </div>

    <!-- 에디터 -->
    <div id="editor-view">
      <div class="editor-header">
        <h2 id="editor-title-label">새 글 작성</h2>
        <span id="draft-status"></span>
        <button class="btn" onclick="restoreDraft()" id="draft-restore-btn" style="display:none">임시저장 불러오기</button>
        <button class="btn" onclick="showList()">취소</button>
      </div>
      <input type="text" id="title-input" placeholder="제목" oninput="scheduleDraftSave()">
      <div class="editor-meta">
        <select id="author-select">
          <option value="마스터">마스터</option>
          <option value="슬레이브">슬레이브</option>
        </select>
        <input type="datetime-local" id="date-input">
      </div>
      <div class="editor-tabs">
        <button class="tab active" onclick="switchTab('write')" id="tab-write">작성</button>
        <button class="tab" onclick="switchTab('preview')" id="tab-preview">미리보기</button>
      </div>
      <div class="editor-pane">
        <textarea id="content-input" placeholder="마크다운으로 작성하세요&#10;&#10;이미지/영상은 하단 첨부 버튼을 사용하거나&#10;![설명](URL) 형식으로 직접 삽입할 수 있습니다." oninput="scheduleDraftSave()"></textarea>
        <div id="preview-pane" class="post-body"></div>
        <div class="media-toolbar">
          <span>미디어</span>
          <button class="upload-btn" onclick="document.getElementById('file-input').click()">파일 첨부</button>
          <input type="file" id="file-input" accept="image/*,video/mp4" multiple onchange="uploadFiles(this.files)">
          <button class="upload-btn" onclick="toggleMediaPanel()" id="media-panel-btn">버킷 보기</button>
          <span id="upload-status"></span>
        </div>
      </div>
      <!-- 버킷 미리보기 패널 -->
      <div id="media-panel">
        <div class="media-panel-header">
          <span id="media-panel-status">로딩 중...</span>
          <button class="upload-btn" onclick="loadMediaPanel()">새로고침</button>
        </div>
        <div class="media-grid" id="media-grid"></div>
      </div>
      <div class="editor-footer">
        <button class="btn" onclick="saveDraft()">임시저장</button>
        <button class="btn primary" onclick="savePost()">저장</button>
      </div>
    </div>
  </main>
</div>


<div id="hl-tooltip"></div>
<button id="hl-float-btn" onclick="hlFloatTap()">✏ 형광펜</button>
<div id="hl-popup">
  <!-- 보기 모드 -->
  <div id="hl-view-mode" style="display:none">
    <div id="hl-view-memo" style="font-family:var(--mono);font-size:.82rem;color:var(--text);line-height:1.7;white-space:pre-wrap;min-height:1em"></div>
    <div class="hl-popup-actions" style="margin-top:10px">
      <button class="btn danger" onclick="hlDelete()">삭제</button>
      <button class="btn" onclick="hlCancel()">닫기</button>
      <button class="btn primary" onclick="hlSwitchToEdit()">수정</button>
    </div>
  </div>
  <!-- 편집 모드 -->
  <div id="hl-edit-mode">
    <div class="hl-colors">
      <div class="hl-color-btn" style="background:#ffeb3b" data-color="#ffeb3b" onclick="hlSelectColor('#ffeb3b')"></div>
      <div class="hl-color-btn" style="background:#69f0ae" data-color="#69f0ae" onclick="hlSelectColor('#69f0ae')"></div>
      <div class="hl-color-btn" style="background:#ff80ab" data-color="#ff80ab" onclick="hlSelectColor('#ff80ab')"></div>
      <div class="hl-color-btn" style="background:#80d8ff" data-color="#80d8ff" onclick="hlSelectColor('#80d8ff')"></div>
      <div class="hl-color-btn" style="background:#e040fb" data-color="#e040fb" onclick="hlSelectColor('#e040fb')"></div>
    </div>
    <textarea id="hl-memo-input" placeholder="메모 (선택사항)"></textarea>
    <div class="hl-popup-actions">
      <button class="btn danger" id="hl-delete-btn" style="display:none" onclick="hlDelete()">삭제</button>
      <button class="btn" onclick="hlCancel()">취소</button>
      <button class="btn primary" onclick="hlSave()">저장</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── State ──
let currentPostId = null;
let currentPage = 1;
let editingId = null;

// ── Helpers ──
function $(id) { return document.getElementById(id); }

function toast(msg, error = false) {
  const el = $("toast");
  el.textContent = msg;
  el.className = "show" + (error ? " error" : "");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = "", 2200);
}

function showOnly(viewId) {
  ["list-view","post-view","editor-view"].forEach(id => {
    $(id).style.display = id === viewId ? "block" : "none";
  });
}

function fmtDate(dt) {
  return new Date(dt).toLocaleDateString("ko-KR", { year:"numeric", month:"2-digit", day:"2-digit" });
}

// ── Marked 초기화 (한 번만) ──
marked.use({
  renderer: {
    image(href, title, text) {
      const src = (typeof href === "object") ? (href.href || href.src || "") : (href || "");
      if (/\.mp4(\?|$)/i.test(src)) {
        return `<video controls src="${src}" style="max-width:100%;border-radius:6px;margin:1.5em 0;display:block"></video>`;
      }
      return `<img src="${src}" alt="${text || ""}" loading="lazy" style="max-width:100%;border-radius:6px;margin:1.5em auto;display:block">`;
    }
  }
});

// ── Auth ──
async function login() {
  const pw = $("pw-input").value;
  const res = await fetch("/api/auth", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: pw }),
  });
  if (res.ok) {
    $("login-screen").style.display = "none";
    $("app").style.display = "block";
    loadList();
  } else {
    $("login-error").textContent = "비밀번호가 틀렸습니다.";
    $("pw-input").value = "";
  }
}

async function logout() {
  await fetch("/api/auth", { method: "DELETE" });
  location.reload();
}

$("pw-input").addEventListener("keydown", e => { if (e.key === "Enter") login(); });

// ── 목록 ──
async function loadList(page = 1) {
  currentPage = page;
  showOnly("list-view");
  const res = await fetch(`/api/posts?page=${page}`);
  const data = await res.json();

  $("post-count").textContent = `총 ${data.total}편`;

  const ul = $("post-list");
  if (!data.posts?.length) {
    ul.innerHTML = '<li class="empty-state">아직 작성된 글이 없습니다.</li>';
    return;
  }
  ul.innerHTML = data.posts.map(p => `
    <li class="post-item" onclick="loadPost(${p.id})">
      <span class="post-title">${escHtml(p.title)}</span>
      <span class="post-date">${escHtml(p.author || "마스터")} · ${fmtDate(p.created_at)}</span>
    </li>
  `).join("");

  // 페이지네이션
  const pg = $("pagination");
  if (data.pages <= 1) { pg.innerHTML = ""; return; }
  pg.innerHTML = Array.from({ length: data.pages }, (_, i) => i + 1)
    .map(p => `<button class="page-btn ${p === page ? 'active' : ''}" onclick="loadList(${p})">${p}</button>`)
    .join("");
}

function showList() {
  editingId = null;
  loadList(currentPage);
}

// ── 상세 ──
async function loadPost(id) {
  currentPostId = id;
  const res = await fetch(`/api/posts?id=${id}`);
  const post = await res.json();

  $("post-title").textContent = post.title;
  $("post-date").textContent = `${post.author || "마스터"} · ${fmtDate(post.created_at)}` + (post.updated_at !== post.created_at ? " (수정됨)" : "");

  $("post-body").innerHTML = marked.parse(post.content);
  if (typeof hljs !== "undefined") hljs.highlightAll();

  showOnly("post-view");
  await loadHighlights(id);
  setupHighlightSelection();
}

function editCurrentPost() {
  if (!currentPostId) return;
  fetch(`/api/posts?id=${currentPostId}`)
    .then(r => r.json())
    .then(post => showEditor(post));
}

async function deleteCurrentPost() {
  if (!confirm("삭제하시겠습니까?")) return;
  await fetch(`/api/posts?id=${currentPostId}`, { method: "DELETE" });
  toast("삭제되었습니다.");
  showList();
}

// ── 에디터 ──
function showEditor(post = null) {
  editingId = post?.id || null;
  $("editor-title-label").textContent = editingId ? "글 수정" : "새 글 작성";
  $("title-input").value = post?.title || "";
  $("content-input").value = post?.content || "";
  $("preview-pane").style.display = "none";
  $("content-input").style.display = "block";
  $("tab-write").className = "tab active";
  $("tab-preview").className = "tab";
  // author
  $("author-select").value = post?.author || "마스터";
  // date: 기존 글이면 그 날짜, 새 글이면 지금
  // created_at은 KST 문자열로 저장됨 → 그대로 로컬 input에 표시
  if (post?.created_at) {
    $("date-input").value = post.created_at.slice(0,16).replace(" ","T");
  } else {
    // 새 글: 현재 KST 시각
    const kstNow = new Date(Date.now() + 9*60*60*1000);
    $("date-input").value = toLocalDatetimeInput(kstNow);
  }

  mediaPanelLoaded = false;
  $("media-panel").classList.remove("open");
  showOnly("editor-view");
  if (!post) checkDraft();
  $("title-input").focus();
}

function toLocalDatetimeInput(dt) {
  const pad = n => String(n).padStart(2, "0");
  return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
}

function nowKST() {
  // KST = UTC+9
  const now = new Date();
  const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  return kst.toISOString().replace("T"," ").slice(0,19);
}

function switchTab(tab) {
  if (tab === "preview") {
    $("content-input").style.display = "none";
    $("preview-pane").style.display = "block";
    $("preview-pane").innerHTML = marked.parse($("content-input").value || "");
    if (typeof hljs !== "undefined") hljs.highlightAll();
    $("tab-write").className = "tab";
    $("tab-preview").className = "tab active";
  } else {
    $("content-input").style.display = "block";
    $("preview-pane").style.display = "none";
    $("tab-write").className = "tab active";
    $("tab-preview").className = "tab";
  }
}

async function savePost() {
  const title = $("title-input").value.trim();
  const content = $("content-input").value.trim();
  if (!title) { toast("제목을 입력하세요", true); return; }
  if (!content) { toast("내용을 입력하세요", true); return; }

  const method = editingId ? "PUT" : "POST";
  const url = editingId ? `/api/posts?id=${editingId}` : "/api/posts";

  const author = $("author-select").value;
  const dateVal = $("date-input").value; // datetime-local value는 로컬 시각 그대로
  // KST 문자열로 저장 (브라우저 변환 없이 그대로)
  const created_at = dateVal ? dateVal.replace("T"," ") : undefined;

  const res = await fetch(url, {
    method,
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title, content, author, created_at }),
  });

  if (res.ok) {
    const data = await res.json();
    clearDraft();
    toast("저장되었습니다.");
    const id = editingId || data.id;
    editingId = null;
    loadPost(id);
  } else {
    toast("저장 실패", true);
  }
}

// ── 미디어 업로드 ──
async function uploadFiles(files) {
  if (!files.length) return;
  $("upload-status").textContent = `업로드 중... (0/${files.length})`;

  let done = 0;
  const insertions = [];

  for (const file of files) {
    const fd = new FormData();
    fd.append("file", file);
    const res = await fetch("/api/media", { method: "POST", body: fd });
    if (res.ok) {
      const { url, filename } = await res.json();
      const isVideo = file.type === "video/mp4";
      // mp4 는 ![]() 형식으로 삽입 (커스텀 렌더러가 <video>로 변환)
      insertions.push(isVideo
        ? `\n![${filename}](${url})\n`
        : `\n![${filename}](${url})\n`);
      done++;
      $("upload-status").textContent = `업로드 중... (${done}/${files.length})`;
    } else {
      toast(`${file.name} 업로드 실패`, true);
    }
  }

  // 커서 위치에 삽입
  const ta = $("content-input");
  const pos = ta.selectionStart;
  const val = ta.value;
  const insert = insertions.join("");
  ta.value = val.slice(0, pos) + insert + val.slice(pos);
  ta.selectionStart = ta.selectionEnd = pos + insert.length;
  ta.focus();

  $("upload-status").textContent = `${done}개 완료`;
  $("file-input").value = "";
  setTimeout(() => { $("upload-status").textContent = ""; }, 3000);
}

// ── 임시저장 ──
const DRAFT_KEY = "jns_draft";
let draftTimer = null;

function scheduleDraftSave() {
  clearTimeout(draftTimer);
  draftTimer = setTimeout(saveDraft, 3000);
  $("draft-status").textContent = "";
  $("draft-status").className = "";
}

function saveDraft() {
  const title = $("title-input").value;
  const content = $("content-input").value;
  if (!title && !content) return;
  localStorage.setItem(DRAFT_KEY, JSON.stringify({ title, content, savedAt: Date.now() }));
  $("draft-status").textContent = "임시저장됨";
  $("draft-status").className = "saved";
  setTimeout(() => { $("draft-status").textContent = ""; }, 2000);
}

function clearDraft() {
  localStorage.removeItem(DRAFT_KEY);
  $("draft-status").textContent = "";
  $("draft-restore-btn").style.display = "none";
}

function restoreDraft() {
  const raw = localStorage.getItem(DRAFT_KEY);
  if (!raw) return;
  const { title, content } = JSON.parse(raw);
  $("title-input").value = title || "";
  $("content-input").value = content || "";
  $("draft-restore-btn").style.display = "none";
  toast("임시저장 내용을 불러왔습니다.");
}

function checkDraft() {
  const raw = localStorage.getItem(DRAFT_KEY);
  if (!raw) return;
  const { savedAt } = JSON.parse(raw);
  const min = Math.round((Date.now() - savedAt) / 60000);
  $("draft-restore-btn").style.display = "inline-block";
  $("draft-restore-btn").textContent = `임시저장 불러오기 (${min < 1 ? "방금" : min + "분 전"})`;
}

// ── 버킷 미리보기 ──
let mediaPanelLoaded = false;

function toggleMediaPanel() {
  const panel = $("media-panel");
  panel.classList.toggle("open");
  if (panel.classList.contains("open") && !mediaPanelLoaded) {
    loadMediaPanel();
  }
}

async function loadMediaPanel() {
  mediaPanelLoaded = false;
  $("media-panel-status").textContent = "로딩 중...";
  $("media-grid").innerHTML = "";

  const res = await fetch("/api/media-list");
  if (!res.ok) { $("media-panel-status").textContent = "로드 실패"; return; }
  const { files } = await res.json();

  mediaPanelLoaded = true;
  $("media-panel-status").textContent = `${files.length}개`;

  if (!files.length) {
    $("media-grid").innerHTML = '<div style="padding:20px;color:var(--muted);font-family:var(--mono);font-size:.8rem;grid-column:1/-1">업로드된 파일이 없습니다.</div>';
    return;
  }

  $("media-grid").innerHTML = files.map(f => `
    <div class="media-thumb" onclick="insertMediaFromBucket('${f.url}', '${f.key.split('/').pop()}', '${f.type}')" title="${f.key.split('/').pop()}">
      ${f.type === "video"
        ? `<div class="video-placeholder">▶</div><div class="video-badge">MP4</div>`
        : `<img src="${f.url}" loading="lazy" alt="">`
      }
    </div>
  `).join("");
}

function insertMediaFromBucket(url, filename, type) {
  const ta = $("content-input");
  const pos = ta.selectionStart;
  const val = ta.value;
  const insert = `
![${filename}](${url})
`;
  ta.value = val.slice(0, pos) + insert + val.slice(pos);
  ta.selectionStart = ta.selectionEnd = pos + insert.length;
  ta.focus();
  scheduleDraftSave();
  toast(`${type === "video" ? "영상" : "이미지"} 삽입됨`);
}


// ── 형광펜 ──
const HL_COLORS = ["#ffeb3b","#69f0ae","#ff80ab","#80d8ff","#e040fb"];
let hlState = {
  postId: null,
  highlights: [],       // DB에서 로드한 목록
  selectedColor: "#ffeb3b",
  editingId: null,      // 수정 중인 highlight id
  pendingText: null,    // 새로 선택한 텍스트
};

async function loadHighlights(postId) {
  hlState.postId = postId;
  const res = await fetch(`/api/highlights?post_id=${postId}`);
  if (!res.ok) return;
  const { highlights } = await res.json();
  hlState.highlights = highlights;
  applyHighlights();
}

function applyHighlights() {
  const body = $("post-body");
  if (!body) return;

  // 이미 적용된 mark 제거 후 재적용
  body.querySelectorAll(".hl-mark").forEach(el => {
    el.replaceWith(document.createTextNode(el.textContent));
  });
  body.normalize();

  // 각 하이라이트 텍스트 찾아서 mark로 감싸기
  hlState.highlights.forEach(hl => {
    wrapTextInBody(body, hl.text, hl.id, hl.color, hl.memo || "");
  });
}

function wrapTextInBody(root, searchText, hlId, color, memo) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const nodes = [];
  let node;
  while ((node = walker.nextNode())) nodes.push(node);

  for (const n of nodes) {
    const idx = n.textContent.indexOf(searchText);
    if (idx === -1) continue;

    const before = n.textContent.slice(0, idx);
    const after  = n.textContent.slice(idx + searchText.length);

    const mark = document.createElement("mark");
    mark.className = "hl-mark";
    mark.style.background = color;
    mark.dataset.hlId = hlId;
    mark.dataset.memo = memo;
    mark.textContent = searchText;
    mark.onclick = (e) => { e.stopPropagation(); hlClickExisting(hlId); };

    const frag = document.createDocumentFragment();
    if (before) frag.appendChild(document.createTextNode(before));
    frag.appendChild(mark);
    if (after) frag.appendChild(document.createTextNode(after));

    n.parentNode.replaceChild(frag, n);
    break; // 첫 번째 매칭만
  }
}

// 텍스트 드래그 후 마우스업
function setupHighlightSelection() {
  // 메모 툴팁 - 클릭 토글 (모바일/데스크탑 공통)
  $("post-body").addEventListener("click", (e) => {
    const mark = e.target.closest(".hl-mark");
    const tip = $("hl-tooltip");

    if (!mark || !mark.dataset.memo) {
      tip.classList.remove("show");
      return;
    }

    // 이미 같은 mark 클릭 시 닫기
    if (tip.classList.contains("show") && tip._mark === mark) {
      tip.classList.remove("show");
      tip._mark = null;
      return;
    }

    tip.textContent = mark.dataset.memo;
    tip._mark = mark;
    tip.classList.add("show");

    // 위치: mark 기준으로 위쪽, 뷰포트 벗어나면 아래
    const rect = mark.getBoundingClientRect();
    requestAnimationFrame(() => {
      const tw = tip.offsetWidth;
      const th = tip.offsetHeight;
      let x = rect.left;
      let y = rect.top - th - 8;
      if (x + tw > window.innerWidth - 12) x = window.innerWidth - tw - 12;
      if (x < 8) x = 8;
      if (y < 8) y = rect.bottom + 8;
      tip.style.left = x + "px";
      tip.style.top  = y + "px";
    });
  });

  // 툴팁 외부 클릭 시 닫기
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".hl-mark") && !e.target.closest("#hl-tooltip")) {
      $("hl-tooltip").classList.remove("show");
    }
  });

  $("post-body").addEventListener("mouseup", (e) => {
    if (e.target.closest(".hl-mark")) return; // 기존 하이라이트 클릭은 hlClickExisting에서 처리
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;
    const text = sel.toString().trim();
    if (!text || text.length < 2) return;

    hlState.editingId = null;
    hlState.pendingText = text;
    hlSelectColor(hlState.selectedColor);
    $("hl-view-mode").style.display = "none";
    $("hl-edit-mode").style.display = "block";
    $("hl-memo-input").value = "";
    $("hl-delete-btn").style.display = "none";
    showHlPopup(e.clientX, e.clientY);
    sel.removeAllRanges();
  });

  // 팝업 외부 클릭 시 닫기
  document.addEventListener("mousedown", (e) => {
    if (!e.target.closest("#hl-popup")) hlCancel();
  });

  setupMobileHighlight();
}

function hlClickExisting(hlId) {
  const hl = hlState.highlights.find(h => h.id === hlId);
  if (!hl) return;
  hlState.editingId = hlId;
  hlState.pendingText = null;
  hlSelectColor(hl.color);

  const mark = $("post-body").querySelector(`[data-hl-id="${hlId}"]`);
  const rect = mark?.getBoundingClientRect() || { left: 200, bottom: 200 };

  // 모바일/데스크탑 모두 보기모드 먼저
  $("hl-view-mode").style.display = "block";
  $("hl-edit-mode").style.display = "none";
  $("hl-view-memo").textContent = hl.memo || "(메모 없음)";
  $("hl-view-memo").style.color = hl.memo ? "var(--text)" : "var(--muted)";

  showHlPopup(rect.left, rect.bottom + 4);
}

function hlSwitchToEdit() {
  const hl = hlState.highlights.find(h => h.id === hlState.editingId);
  $("hl-view-mode").style.display = "none";
  $("hl-edit-mode").style.display = "block";
  $("hl-memo-input").value = hl?.memo || "";
  $("hl-delete-btn").style.display = "inline-block";
  $("hl-memo-input").focus();
}

function showHlPopup(x, y) {
  const popup = $("hl-popup");
  popup.style.transform = "";
  popup.style.bottom = "";
  popup.style.position = "fixed";
  popup.classList.add("show");

  requestAnimationFrame(() => {
    const pw = popup.offsetWidth || 300;
    const ph = popup.offsetHeight || 260;
    let left = x;
    let top = y + 6;

    // 오른쪽 넘치면 왼쪽으로
    if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
    if (left < 8) left = 8;

    // 아래 넘치면 위로
    if (top + ph > window.innerHeight - 12) top = y - ph - 10;
    if (top < 8) top = 8;

    popup.style.left = left + "px";
    popup.style.top = top + "px";
  });
}

function hlSelectColor(color) {
  hlState.selectedColor = color;
  document.querySelectorAll(".hl-color-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.color === color);
  });
}

async function hlSave() {
  const memo = $("hl-memo-input").value.trim();
  const color = hlState.selectedColor;

  if (hlState.editingId) {
    // 수정
    await fetch(`/api/highlights?id=${hlState.editingId}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ memo, color }),
    });
    const hl = hlState.highlights.find(h => h.id === hlState.editingId);
    if (hl) { hl.color = color; hl.memo = memo; }
  } else {
    // 새로 추가
    const res = await fetch("/api/highlights", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ post_id: hlState.postId, text: hlState.pendingText, color, memo }),
    });
    if (res.ok) {
      const { id } = await res.json();
      hlState.highlights.push({ id, post_id: hlState.postId, text: hlState.pendingText, color, memo });
    }
  }

  hlCancel();
  applyHighlights();
}

async function hlDelete() {
  if (!hlState.editingId) return;
  if (!confirm("형광펜을 삭제하시겠습니까?")) return;
  await fetch(`/api/highlights?id=${hlState.editingId}`, { method: "DELETE" });
  hlState.highlights = hlState.highlights.filter(h => h.id !== hlState.editingId);
  hlCancel();
  applyHighlights();
}

function hlCancel() {
  const popup = $("hl-popup");
  popup.classList.remove("show");
  popup.style.transform = "";
  popup.style.bottom = "";
  hlState.editingId = null;
  hlState.pendingText = null;
  $("hl-float-btn").classList.remove("show");
}

// ── 모바일 형광펜 플로팅 버튼 ──
let floatTimer = null;

function isMobile() {
  return window.matchMedia("(pointer: coarse)").matches;
}

function setupMobileHighlight() {
  if (!isMobile()) return;

  document.addEventListener("selectionchange", () => {
    clearTimeout(floatTimer);
    floatTimer = setTimeout(() => {
      const sel = window.getSelection();
      const text = sel?.toString().trim();
      const btn = $("hl-float-btn");

      // post-body 안의 선택인지 확인
      const body = $("post-body");
      if (!body || !text || text.length < 2) {
        btn.classList.remove("show");
        return;
      }
      if (!body.contains(sel.anchorNode)) {
        btn.classList.remove("show");
        return;
      }

      btn.classList.add("show");
    }, 300);
  });
}

function hlFloatTap() {
  const sel = window.getSelection();
  const text = sel?.toString().trim();
  if (!text || text.length < 2) return;

  hlState.editingId = null;
  hlState.pendingText = text;
  hlSelectColor(hlState.selectedColor);
  $("hl-view-mode").style.display = "none";
  $("hl-edit-mode").style.display = "block";
  $("hl-memo-input").value = "";
  $("hl-delete-btn").style.display = "none";

  // 선택 영역 기준 위치
  const range = window.getSelection()?.getRangeAt(0);
  const rect2 = range?.getBoundingClientRect() || { left: window.innerWidth/2, bottom: 200 };
  sel.removeAllRanges();
  $("hl-float-btn").classList.remove("show");
  showHlPopup(rect2.left, rect2.bottom + 4);
}
function escHtml(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── 서비스워커 등록 ──
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}

// ── 초기 로드 ──
(async () => {
  if (document.cookie.includes("token=")) {
    const res = await fetch("/api/posts?page=1");
    if (res.ok) {
      $("login-screen").style.display = "none";
      $("app").style.display = "block";
      loadList();
      return;
    }
    document.cookie = "token=; Path=/; Max-Age=0";
  }
  $("login-screen").style.display = "flex";
})();
